# =============================================================================
# openprimus — SIMULATOR config (runs on your PC, no ESP32 needed)
# =============================================================================
# This is a thin entry point. The actual logic lives in modular packages:
#   packages/common.yaml     — fonts, shared state, simulated sensors
#   packages/home_menu.yaml  — Page 1: the brew-mode menu
#   packages/brew_page.yaml  — Page 2: the brewing screen + live updates
#
# Run:  ./scripts/run_sim.sh   (or: esphome run firmware/sim.yaml)
# =============================================================================

esphome:
  name: openprimus-sim
  friendly_name: "openPrimus (simulator)"

host: {}
logger:
  level: INFO

# ---------------------------------------------------------------------------
# SIMULATED display — SDL2 window on the host
# ---------------------------------------------------------------------------
display:
  - platform: sdl
    id: primus_display
    dimensions:
      width: 360       # WPM Primus circular group-head display (best-known round-panel res)
      height: 360      # confirm exact panel on hardware probe
    window_options:
      position:
        centered_on_display: 1
      resizable: true

# ---------------------------------------------------------------------------
# LVGL top-level (pages come from the packages)
# ---------------------------------------------------------------------------
lvgl:
  displays: [primus_display]
  touchscreens: [sim_touch]
  color_depth: 16
  default_font: font_body

# ---------------------------------------------------------------------------
# Pull in the modular packages
# ---------------------------------------------------------------------------
packages:
  common:    !include packages/common.yaml
  home_menu: !include packages/home_menu.yaml
  brew_page: !include packages/brew_page.yaml
