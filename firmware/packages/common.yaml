# =============================================================================
# common.yaml — shared state, sensors, fonts (the "services" layer)
# =============================================================================
# Included by both sim.yaml and primus.yaml. Holds everything that isn't a UI
# page: global state, the simulated sensors, and font definitions.
# =============================================================================
# Design note: the brew simulation state lives here as globals so any page can
# read/toggle it without coupling. Real hardware will swap the `sensor:` blocks
# for real ADC reads, but the globals + the math stay the same.
# =============================================================================

# ---------------------------------------------------------------------------
# Fonts — compact sizes for a small round display
# ---------------------------------------------------------------------------
font:
  - file: "gfonts://Roboto@700"
    id: font_title
    size: 18
    bpp: 4
  # Body font WITH icons merged in via `extras` — so a single button label can
  # render both Latin text and icon glyphs (e.g. "\uE56B Classic 9 Bar").
  - file: "gfonts://Roboto"
    id: font_body
    size: 14
    bpp: 4
    extras:
      - file: "fonts/material-symbols-rounded.ttf"
        glyphs:
          - "\U0000E56B"   # coffee
          - "\U0000E541"   # local_cafe
          - "\U0000E63E"   # wifi
          - "\U0000E63F"   # wifi_off
          - "\U0000E037"   # play_arrow
          - "\U0000E047"   # stop
          - "\U0000E5C4"   # arrow_back
          - "\U0000F076"   # thermostat
          - "\U0000E798"   # water_drop
          - "\U0000E9E4"   # speed
          - "\U0000E425"   # timer
          - "\U0000EA4A"   # science
          - "\U0000E8B8"   # tune
  - file: "gfonts://Roboto"
    id: font_small
    size: 11
    bpp: 4
  # Icon-only font (for the topbar WiFi indicator and standalone icon labels).
  - file: "fonts/material-symbols-rounded.ttf"
    id: font_icons
    size: 18
    bpp: 4
    glyphs:
      - "\U0000E56B"   # coffee
      - "\U0000E541"   # local_cafe
      - "\U0000E63E"   # wifi
      - "\U0000E63F"   # wifi_off
      - "\U0000E037"   # play_arrow
      - "\U0000E047"   # stop
      - "\U0000E5C4"   # arrow_back
      - "\U0000F076"   # thermostat
      - "\U0000E798"   # water_drop
      - "\U0000E9E4"   # speed
      - "\U0000E425"   # timer
      - "\U0000EA4A"   # science
      - "\U0000E8B8"   # tune

# ---------------------------------------------------------------------------
# Touchscreen (simulator) — wires the SDL2 mouse into LVGL as a pointer input.
# Without this, clicks in the simulator window do nothing (LVGL never sees them).
# On real hardware this is replaced by the gt911 component (see primus.yaml).
# ---------------------------------------------------------------------------
touchscreen:
  - platform: sdl
    id: sim_touch
    sdl_id: primus_display

# ---------------------------------------------------------------------------
# Shared state
# ---------------------------------------------------------------------------
globals:
  - id: brew_active
    type: bool
    restore_value: no
    initial_value: "false"
  - id: brew_pressure_val
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: brew_temp_val
    type: float
    restore_value: no
    initial_value: "90.0"
  - id: brew_weight_val
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: brew_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: current_mode
    type: std::string
    restore_value: no
    initial_value: '""'
  # Scratch globals for the brew-page interval (so lambdas only do plain-C++
  # math, and the widget updates read safe pre-computed values).
  - id: _phase_str
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: _elapsed_val
    type: float
    restore_value: no
    initial_value: "0.0"
  - id: _press_val
    type: float
    restore_value: no
    initial_value: "0.0"

# ---------------------------------------------------------------------------
# WiFi connection state (drives the topbar icon).
# In the simulator this is a toggled global (no real radio). On real hardware,
# bind it to the actual wifi component via on_connect/on_disconnect triggers
# (see primus.yaml) — the topbar reads only this global, so it works in both.
# ---------------------------------------------------------------------------
  - id: wifi_connected
    type: bool
    restore_value: no
    initial_value: "false"

# ---------------------------------------------------------------------------
# Simulated sensors — animated telemetry, driven by the config number entities.
# On real hardware these become real `adc` sensors with calibration filters;
# the math here is a stand-in until then.
# ---------------------------------------------------------------------------
sensor:
  # Pressure — ramps through pre-infusion phase, then to target extraction
  # pressure. Reads config: preinfusion_pressure, preinfusion_time, target_pressure.
  - platform: template
    id: sim_pressure
    name: "Pressure"
    unit_of_measurement: "bar"
    device_class: pressure
    accuracy_decimals: 1
    update_interval: 500ms
    lambda: |-
      if (id(brew_active)) {
        // Compute elapsed time of the current brew.
        uint32_t now = millis();
        float elapsed = (id(brew_start_ms) != 0 && now >= id(brew_start_ms))
                        ? (now - id(brew_start_ms)) / 1000.0f : 0.0f;
        // Phase target: pre-infusion pressure during preinfusion_time, then full target.
        float pi_p   = id(preinfusion_pressure).state;
        float pi_t   = id(preinfusion_time).state;
        float tgt    = id(target_pressure).state;
        float target = (elapsed < pi_t) ? pi_p : tgt;
        // exponential approach toward the phase target + jitter
        id(brew_pressure_val) += (target - id(brew_pressure_val)) * 0.15f;
        id(brew_pressure_val) += (float)(rand() % 100 - 50) / 250.0f;
      } else {
        id(brew_pressure_val) *= 0.8f;
      }
      if (id(brew_pressure_val) < 0) id(brew_pressure_val) = 0;
      return id(brew_pressure_val);

  # Temperature — slowly drifts toward the configured target_temp.
  - platform: template
    id: sim_temperature
    name: "Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      float target = id(target_temp).state;
      id(brew_temp_val) += (target - id(brew_temp_val)) * 0.02f;
      return id(brew_temp_val);

  # Flow rate — derived from pressure (higher pressure => higher flow), +noise.
  # Rough model: flow ~ pressure * k, k ~= 1.2 ml/s/bar.
  - platform: template
    id: sim_flow_rate
    name: "Flow Rate"
    unit_of_measurement: "ml/s"
    accuracy_decimals: 1
    update_interval: 500ms
    lambda: |-
      if (!id(brew_active)) return 0.0f;
      float p = id(brew_pressure_val);
      float flow = p * 1.2f + (float)(rand() % 60 - 30) / 100.0f;
      if (flow < 0) flow = 0;
      return flow;

  # Shot weight — cumulative integration of flow rate over the brew (1g ~= 1ml).
  # Resets to 0 when a brew starts.
  - platform: template
    id: sim_shot_weight
    name: "Shot Weight"
    unit_of_measurement: "g"
    accuracy_decimals: 1
    state_class: measurement
    update_interval: 500ms
    lambda: |-
      if (id(brew_active)) {
        // 500ms interval => flow(ml/s) * 0.5s = ml this tick.
        id(brew_weight_val) += id(sim_flow_rate).state * 0.5f;
      }
      return id(brew_weight_val);

